<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 6px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            min-width: 0;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 22px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
        }

        .search-box button:active {
            transform: translateY(0);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            display: none;
        }

        .error.active {
            display: block;
        }

        .weather-info {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .weather-info.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .weather-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .weather-header h2 {
            color: #333;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .location {
            color: #666;
            font-size: 14px;
        }

        .temp-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .temperature {
            font-size: 72px;
            color: #667eea;
            font-weight: 300;
            line-height: 1;
        }

        .temp-unit {
            font-size: 28px;
            color: #667eea;
        }

        .description {
            text-align: center;
            font-size: 18px;
            color: #555;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-label {
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .detail-value {
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }

        .forecast-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .forecast-section h3 {
            color: #333;
            font-size: 15px;
            margin-bottom: 12px;
        }

        .forecast-cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .forecast-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px 4px;
            text-align: center;
        }

        .forecast-day {
            font-size: 10px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .forecast-emoji {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .forecast-desc {
            font-size: 9px;
            color: #888;
            margin-bottom: 5px;
            text-transform: capitalize;
        }

        .forecast-temps {
            font-size: 11px;
            font-weight: 600;
        }

        .forecast-high { color: #e67e22; }
        .forecast-low  { color: #667eea; }

        /* ── Mobile ── */
        @media (max-width: 480px) {
            body {
                padding: 12px;
                align-items: flex-start;
            }

            .card {
                padding: 20px 16px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 22px;
            }

            .search-box {
                flex-direction: column;
            }

            .search-box input,
            .search-box button {
                width: 100%;
                font-size: 16px;
            }

            .search-box button {
                padding: 14px;
            }

            .temperature {
                font-size: 56px;
            }

            .weather-details {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .detail-value {
                font-size: 16px;
            }

            .forecast-cards {
                grid-template-columns: repeat(5, 1fr);
                gap: 5px;
            }

            .forecast-emoji {
                font-size: 18px;
            }

            .forecast-day {
                font-size: 9px;
            }

            .forecast-temps {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🌤️ Weather App</h1>
                <p>Check weather for any city</p>
            </div>

            <div class="search-box">
                <input
                    type="text"
                    id="cityInput"
                    placeholder="Enter city name..."
                    autocomplete="off"
                >
                <button onclick="searchWeather()">Search</button>
            </div>

            <div class="error" id="errorMsg"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Fetching weather data...</p>
            </div>

            <div class="weather-info" id="weatherInfo">
                <div class="weather-header">
                    <h2 id="cityName"></h2>
                    <p class="location" id="country"></p>
                </div>

                <div class="temp-display">
                    <div class="temperature"><span id="temperature"></span><span class="temp-unit">°C</span></div>
                </div>

                <div class="description" id="description"></div>

                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-label">Feels Like</div>
                        <div class="detail-value" id="feelsLike"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value" id="humidity"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Wind Speed</div>
                        <div class="detail-value" id="windSpeed"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Pressure</div>
                        <div class="detail-value" id="pressure"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Cloudiness</div>
                        <div class="detail-value" id="cloudiness"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Updated</div>
                        <div class="detail-value" id="timestamp"></div>
                    </div>
                </div>
            </div>

            <div class="forecast-section" id="forecastSection" style="display: none;">
                <h3>5-Day Forecast</h3>
                <div class="forecast-cards" id="forecastCards"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('cityInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchWeather();
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            setTimeout(() => errorDiv.classList.remove('active'), 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        function formatTime(dateString) {
            const date = new Date(dateString);
            return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
        }

        const weatherEmoji = {
            'Clear': '☀️', 'Clouds': '☁️', 'Rain': '🌧️',
            'Drizzle': '🌦️', 'Thunderstorm': '⛈️', 'Snow': '❄️',
            'Mist': '🌫️', 'Fog': '🌫️', 'Haze': '🌫️',
        };

        function getDayLabel(dateStr, index) {
            if (index === 0) return 'Today';
            if (index === 1) return 'Tmrw';
            return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(dateStr).getDay()];
        }

        function displayForecast(data) {
            const cards = document.getElementById('forecastCards');
            cards.innerHTML = '';
            data.forEach((day, index) => {
                const emoji = weatherEmoji[day.description] || '🌡️';
                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `
                    <div class="forecast-day">${getDayLabel(day.date, index)}</div>
                    <div class="forecast-emoji">${emoji}</div>
                    <div class="forecast-desc">${day.description}</div>
                    <div class="forecast-temps">
                        <span class="forecast-high">${day.temp_max}°</span>
                        <span style="color:#ccc"> / </span>
                        <span class="forecast-low">${day.temp_min}°</span>
                    </div>
                `;
                cards.appendChild(card);
            });
            document.getElementById('forecastSection').style.display = 'block';
        }

        function loadForecast(city) {
            fetch(`/api/weather/get_forecast/?city=${encodeURIComponent(city)}`)
                .then(r => r.json())
                .then(data => { if (Array.isArray(data)) displayForecast(data); })
                .catch(e => console.error('Forecast error:', e));
        }

        function displayWeather(data) {
            document.getElementById('cityName').textContent = data.city;
            document.getElementById('country').textContent = data.country || '';
            document.getElementById('temperature').textContent = Math.round(data.temperature);
            document.getElementById('feelsLike').textContent = data.feels_like ? Math.round(data.feels_like) + '°C' : 'N/A';
            document.getElementById('humidity').textContent = data.humidity + '%';
            document.getElementById('windSpeed').textContent = data.wind_speed + ' m/s';
            document.getElementById('pressure').textContent = data.pressure + ' hPa';
            document.getElementById('cloudiness').textContent = data.cloudiness + '%';
            document.getElementById('description').textContent = data.description;
            document.getElementById('timestamp').textContent = formatTime(data.timestamp);
            document.getElementById('weatherInfo').classList.add('active');
            loadForecast(data.city);
        }

        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) { showError('Please enter a city name'); return; }

            showLoading(true);
            document.getElementById('weatherInfo').classList.remove('active');
            document.getElementById('forecastSection').style.display = 'none';

            fetch(`/api/weather/get_weather/?city=${encodeURIComponent(city)}`)
                .then(response => {
                    if (!response.ok) return response.json().then(d => { throw new Error(d.error || 'Not found'); });
                    return response.json();
                })
                .then(data => {
                    showLoading(false);
                    displayWeather(data);
                    document.getElementById('cityInput').value = '';
                })
                .catch(error => {
                    showLoading(false);
                    showError(error.message || 'Error fetching weather data.');
                });
        }
    </script>
</body>
</html>
